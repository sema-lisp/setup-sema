name: test
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly: catch asset-shape breakage from new sema releases

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is Apple Silicon (aarch64). Intel macOS (macos-13, x86_64)
        # is omitted: GitHub is sunsetting its Intel-mac runners and their queue is
        # unreliable; x86_64-apple-darwin uses the identical .tar.xz install path
        # this matrix already exercises on the aarch64 macos-latest cell.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        sema-version: [latest, "1.30.0"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Sema
        id: sema
        uses: ./
        with:
          sema-version: ${{ matrix.sema-version }}

      - name: Resolved version output is present
        shell: bash
        run: |
          test -n "${{ steps.sema.outputs.sema-version }}"
          echo "Installed: ${{ steps.sema.outputs.sema-version }}"

      - name: Pinned version matches request
        if: matrix.sema-version != 'latest'
        shell: bash
        run: test "${{ steps.sema.outputs.sema-version }}" = "${{ matrix.sema-version }}"

      - name: sema --version runs
        shell: bash
        run: sema --version

      - name: Sema evaluates code
        shell: bash
        run: |
          echo '(println (+ 1 2))' > smoke.sema
          OUT="$(sema smoke.sema)"
          OUT="${OUT%$'\r'}"   # tolerate CRLF from a native Windows build
          test "$OUT" = "3"

      - name: Second run hits the tool cache
        id: sema2
        uses: ./
        with:
          sema-version: ${{ matrix.sema-version }}

      - name: Assert cache-hit on rerun
        shell: bash
        run: test "${{ steps.sema2.outputs.cache-hit }}" = "true"

  # Resolution + security paths that the OS matrix (happy path only) can't prove.
  resolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Version validation rejects hostile inputs (path traversal, injection)
        shell: bash
        run: bash scripts/test_validation.sh

      - name: A .sema-version file is honored when sema-version is unset
        shell: bash
        run: echo "1.30.0" > .sema-version
      - uses: ./
        id: fromfile
        with:
          sema-version: ""
      - name: Assert .sema-version pin was used
        shell: bash
        run: |
          test "${{ steps.fromfile.outputs.sema-version }}" = "1.30.0"
          rm -f .sema-version

      - name: A .tool-versions file is honored when sema-version is unset
        shell: bash
        run: echo "sema 1.30.0" > .tool-versions
      - uses: ./
        id: fromtool
        with:
          sema-version: ""
      - name: Assert .tool-versions pin was used
        shell: bash
        run: |
          test "${{ steps.fromtool.outputs.sema-version }}" = "1.30.0"
          rm -f .tool-versions

      - name: The deprecated 'version' alias still resolves
        uses: ./
        id: alias
        with:
          version: "1.30.0"
      - name: Assert alias resolved and cache-key is exposed
        shell: bash
        run: |
          test "${{ steps.alias.outputs.sema-version }}" = "1.30.0"
          test -n "${{ steps.alias.outputs.cache-key }}"

      - name: verify:false skips the sema --version step (still installs + PATHs)
        uses: ./
        id: noverify
        with:
          sema-version: "1.30.0"
          verify: "false"
      - name: Assert install still worked with verify disabled
        shell: bash
        run: |
          test "${{ steps.noverify.outputs.sema-version }}" = "1.30.0"
          sema --version
