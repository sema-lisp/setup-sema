name: "Setup Sema"
description: "Install the Sema Lisp programming language (sema-lang.com) and add it to PATH"
author: "sema-lisp"

branding:
  icon: "code"
  color: "green"

inputs:
  sema-version:
    description: >-
      Sema version to install: "1.30.0", "v1.30.0", or "latest". When empty,
      falls back to a .sema-version / .tool-versions file, then "latest".
    required: false
    default: ""
  version:
    description: "Deprecated alias for sema-version (removed in v2)"
    required: false
    default: ""
  github-token:
    description: "Token for release API calls (avoids rate limits). Not sent to asset downloads."
    required: false
    default: ${{ github.server_url == 'https://github.com' && github.token || '' }}
  download-url:
    description: >-
      Escape hatch: install this exact archive URL (mirrors, air-gapped CI),
      bypassing version/manifest resolution. Verified against <url>.sha256 if
      present, otherwise installed unverified — you own the URL's trust.
    required: false
    default: ""
  verify:
    description: "Run 'sema --version' after install to confirm the binary executes"
    required: false
    default: "true"

outputs:
  sema-version:
    description: "The concrete version installed, e.g. 1.30.0 (or 'custom' for a download-url with no version)"
    value: ${{ steps.install.outputs.sema-version }}
  version:
    description: "Deprecated alias of sema-version"
    value: ${{ steps.install.outputs.version }}
  sema-path:
    description: "Absolute path to the install dir added to PATH"
    value: ${{ steps.install.outputs.sema-path }}
  cache-hit:
    description: "true if satisfied from the runner tool cache"
    value: ${{ steps.install.outputs.cache-hit }}
  cache-key:
    description: "Ready-made cache-key component for a downstream dependency cache"
    value: ${{ steps.install.outputs.cache-key }}
  download-url:
    description: "The asset URL actually used (or 'cache')"
    value: ${{ steps.install.outputs.download-url }}

runs:
  using: "composite"
  steps:
    - name: Install Sema
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_SEMA_VERSION: ${{ inputs.sema-version }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_DOWNLOAD_URL: ${{ inputs.download-url }}
      run: bash "${{ github.action_path }}/scripts/install.sh"

    - name: Verify installation
      if: ${{ inputs.verify == 'true' }}
      shell: bash
      run: sema --version
